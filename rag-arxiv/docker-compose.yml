version: "3.9"

services:
  rag-app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/app/data    # persist downloaded papers and index
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
